name: 自动部署到腾讯云服务器

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: 部署生产环境
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: 拉取仓库代码
        uses: actions/checkout@v4

      - name: 准备 SSH 目录
        run: mkdir -p ~/.ssh

      - name: 写入部署私钥
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          printf "%s\n" "$DEPLOY_SSH_KEY" | tr -d '\r' > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      - name: 写入 known_hosts
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
        run: |
          ssh-keyscan -p "${DEPLOY_PORT:-22}" -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: 打包当前发布内容
        run: |
          tar \
            --exclude=".git" \
            --exclude="web/node_modules" \
            --exclude="web/.next" \
            --exclude="deploy/logs" \
            -czf /tmp/imagepromptive-release.tgz .

      - name: 上传发布包到服务器
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          scp -P "${DEPLOY_PORT:-22}" /tmp/imagepromptive-release.tgz "${DEPLOY_USER}@${DEPLOY_HOST}:/tmp/imagepromptive-release.tgz"

      - name: 解压发布包并执行部署脚本
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          ssh -p "${DEPLOY_PORT:-22}" "${DEPLOY_USER}@${DEPLOY_HOST}" "mkdir -p '${DEPLOY_PATH:-/www/image-2-prompt-site}' && tar -xzf /tmp/imagepromptive-release.tgz -C '${DEPLOY_PATH:-/www/image-2-prompt-site}' && rm -f /tmp/imagepromptive-release.tgz && cd '${DEPLOY_PATH:-/www/image-2-prompt-site}' && SKIP_GIT_PULL=1 bash deploy/deploy.sh"
