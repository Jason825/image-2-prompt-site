server {
  listen 80;
  server_name imagepromptive.top www.imagepromptive.top;

  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl;
  http2 on;
  server_name imagepromptive.top www.imagepromptive.top;

  ssl_certificate /etc/nginx/certs/imagepromptive.top_nginx/imagepromptive.top_bundle.pem;
  ssl_certificate_key /etc/nginx/certs/imagepromptive.top_nginx/imagepromptive.top.key;

  client_max_body_size 20m;

  location = /deploy-hook {
    proxy_pass http://host.docker.internal:9001/deploy-hook;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location / {
    proxy_pass http://app:3000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
  }
}
