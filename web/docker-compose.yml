services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: imagepromptive-app
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-change_this_password}@db:5432/${POSTGRES_DB:-imagepromptive}
    depends_on:
      - db

  db:
    image: postgres:16-alpine
    container_name: imagepromptive-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-imagepromptive}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_this_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/prompt_stats.sql:/docker-entrypoint-initdb.d/001-prompt_stats.sql:ro

  nginx:
    image: nginx:1.27-alpine
    container_name: imagepromptive-nginx
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  postgres_data:
